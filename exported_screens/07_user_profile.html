        // Simple micro-interaction for tabs
        const tabButtons = document.querySelectorAll('.sticky button');
        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                tabButtons.forEach(b => {
                    b.classList.remove('profile-tab-active', 'text-primary', 'font-bold');
                    b.classList.add('text-outline', 'font-semibold');
                });
                btn.classList.add('profile-tab-active', 'text-primary', 'font-bold');
                btn.classList.remove('text-outline', 'font-semibold');
            });
        });

        // Pull to refresh effect mockup
        let startY = 0;
        window.addEventListener('touchstart', e => {
            startY = e.touches[0].pageY;
        }, {passive: true});

        window.addEventListener('touchmove', e => {
            const y = e.touches[0].pageY;
            if (window.scrollY === 0 && y > startY) {
                // Potential pull to refresh visual trigger
            }
        }, {passive: true});
