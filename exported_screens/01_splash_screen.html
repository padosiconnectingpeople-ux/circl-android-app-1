<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .splash-logo-container {
            animation: logo-reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes logo-reveal {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.6s;
            opacity: 0;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .custom-gradient-bar {
            background: linear-gradient(90deg, #5B4FE8 0%, #FF6B35 100%);
        }

        .ios-indicator {
            width: 134px;
            height: 5px;
            background-color: #1C1A24;
            border-radius: 100px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen w-full flex flex-col overflow-hidden">
<!-- Status Bar -->
<header class="w-full flex justify-between items-center px-lg py-sm z-50">
<div class="font-bold text-[15px] text-on-surface">11:03</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[20px]">battery_very_low</span>
</div>
</header>
<!-- Main Content: Logo & Tagline -->
<main class="flex-grow flex flex-col items-center justify-center relative">
<!-- Logo Section -->
<div class="splash-logo-container flex flex-col items-center gap-md">
<!-- Custom Styled 'C' Logo -->
<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Outer Ring (Incomplete Circle) -->
<svg class="absolute inset-0" fill="none" height="128" viewbox="0 0 128 128" width="128" xmlns="http://www.w3.org/2000/svg">
<path d="M100 30C115 45 120 70 110 95C95 125 55 128 30 110C5 92 0 50 20 25C35 5 65 0 85 10" stroke="#5B4FE8" stroke-linecap="round" stroke-width="12"></path>
</svg>
<!-- Central Dot -->
<div class="w-4 h-4 bg-primary-container rounded-full shadow-[0_0_15px_rgba(91,79,232,0.4)]"></div>
</div>
<!-- Brand Name -->
<h1 class="font-headline-md text-headline-md font-extrabold tracking-tighter text-primary mt-base">
                Circl
            </h1>
</div>
<!-- Tagline -->
<div class="fade-in-up mt-lg">
<p class="font-label-md text-label-md text-on-surface font-medium uppercase tracking-[0.2em]">
                Every Colony Has A Circle
            </p>
</div>
</main>
<!-- Bottom Ornamentation -->
<footer class="w-full flex flex-col items-center pb-base">
<!-- Horizontal Gradient Bar -->
<div class="w-full h-1 custom-gradient-bar mb-lg"></div>
<!-- iPhone Home Indicator Area -->
<div class="pb-sm">
<div class="ios-indicator opacity-20"></div>
</div>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle pulse for the central dot
            const dot = document.querySelector('.w-4.h-4.bg-primary-container');
            if (dot) {
                setInterval(() => {
                    dot.style.transform = 'scale(1.2)';
                    dot.style.transition = 'transform 0.8s ease-in-out';
                    setTimeout(() => {
                        dot.style.transform = 'scale(1)';
                    }, 800);
                }, 1600);
            }

            // Optional: Automatically navigate after delay
            // setTimeout(() => {
            //    console.log("Navigating to Home...");
            // }, 3500);
        });
    </script>
</body></html>
