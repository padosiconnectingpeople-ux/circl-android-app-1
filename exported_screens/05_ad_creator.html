<style>

<body class="bg-[#F8F9FF] text-on-surface min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="bg-surface sticky top-0 z-50 flex justify-between items-center w-full px-container-margin py-sm shadow-sm">
<div class="flex items-center gap-md">
<button class="transition-all duration-200 active:scale-95 text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Advertise in Your Colony</h1>
</div>
<div class="flex items-center gap-md">

</header>
<main class="flex-grow px-container-margin py-lg space-y-xl max-w-md mx-auto w-full">
<!-- Step Indicator -->
<section class="flex items-center justify-between px-md relative">
<div class="absolute top-1/2 left-0 right-0 h-[2px] bg-surface-container-high -translate-y-1/2 z-0"></div>
<div class="z-10 w-8 h-8 rounded-full flex items-center justify-center font-bold text-label-md step-active transition-all">1</div>
<div class="z-10 w-8 h-8 rounded-full flex items-center justify-center font-bold text-label-md step-inactive">2</div>

<div class="z-10 w-8 h-8 rounded-full flex items-center justify-center font-bold text-label-md step-inactive">4</div>
</section>
<!-- Media Upload / AI Section -->
<section class="space-y-md">
<div class="relative w-full aspect-video border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center bg-surface-container-lowest hover:border-primary transition-colors group cursor-pointer">
<div class="flex flex-col items-center gap-sm">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-primary transition-colors">camera_enhance</span>
<p class="font-label-md text-on-surface-variant">Add Photo or Video</p>
</div>
</div>
<div class="flex items-center gap-md">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-sm text-outline uppercase tracking-wider">or</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<button class="w-full py-md px-lg border-2 border-primary text-primary rounded-xl font-bold flex items-center justify-center gap-sm transition-all active:scale-[0.98] hover:bg-primary-container/10">
<span class="material-symbols-outlined">psychology</span>
                Generate with AI
            </button>
</section>
<!-- Inputs Section -->
<section class="space-y-lg">
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant ml-1">Ad Headline</label>
<input class="w-full px-md py-lg bg-surface border-0 rounded-xl focus:ring-2 focus:ring-primary shadow-sm text-body-lg placeholder:text-outline-variant" placeholder="e.g. Best Organic Milk Delivery" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant ml-1">Description</label>
<textarea class="w-full px-md py-lg bg-surface border-0 rounded-xl focus:ring-2 focus:ring-primary shadow-sm text-body-lg placeholder:text-outline-variant resize-none" placeholder="Describe your product or service..." rows="3"></textarea>
</div>
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant ml-1">Primary Action (CTA)</label>
<div class="relative">
<select class="w-full px-md py-lg bg-surface border-0 rounded-xl focus:ring-2 focus:ring-primary shadow-sm text-body-lg appearance-none cursor-pointer">
<option value="call">Call</option>
<option selected="" value="whatsapp">WhatsApp</option>
<option value="visit">Visit Website</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</section>
<!-- Tiered Pricing Preview -->
<section class="space-y-md">

<!-- Society Tier -->

</div>
</div>
<!-- Colony Tier (Active) -->

<span class="material-symbols-outlined text-[16px]">map</span>

</div>
</div>

<div class="flex justify-between items-start">
<div>
<p class="font-label-sm text-outline-variant uppercase">Neighborhood (5km)</p>

</div>
<div class="flex items-center gap-xs text-on-surface-variant bg-surface-container-high px-sm py-xs rounded-full">
<span class="material-symbols-outlined text-[16px]">ads_click</span>

</div>
</div>
</div>
</div>

            Next: Choose Audience

</button>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('.bento-grid > div').forEach(card => {
            card.addEventListener('click', function() {
                // Remove active classes from all
                document.querySelectorAll('.bento-grid > div').forEach(c => {
                    c.classList.remove('bg-primary-container', 'text-on-primary-container', 'ring-2', 'ring-primary', 'shadow-lg');
                    c.classList.add('bg-surface', 'border', 'border-outline-variant', 'shadow-sm');
                    const pop = c.querySelector('.bg-secondary');
                    if(pop) pop.classList.add('hidden');
                });
                // Add active to current
                this.classList.remove('bg-surface', 'border', 'border-outline-variant', 'shadow-sm');
                this.classList.add('bg-primary-container', 'text-on-primary-container', 'ring-2', 'ring-primary', 'shadow-lg');
                const pop = this.querySelector('.bg-secondary');
                if(pop) pop.classList.remove('hidden');
            });
        });

        // Animation for the dash box on hover
        const uploadBox = document.querySelector('.border-dashed');
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('bg-primary-container/10', 'border-primary');
        });
        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('bg-primary-container/10', 'border-primary');
        });
    </script>
